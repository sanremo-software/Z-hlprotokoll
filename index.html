<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kassenbericht · Originalformat</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      background: #e5e7eb;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      padding: 30px;
      font-family: 'Courier New', 'Segoe UI', monospace;
    }
    /* A4-ähnliches Papier */
    .bericht {
      max-width: 900px;
      width: 100%;
      background: white;
      box-shadow: 0 10px 25px rgba(0,0,0,0.1);
      padding: 25px 30px 35px 30px;
      border: 1px solid #aaa;
    }
    /* Kopfzeile */
    .kopf {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      flex-wrap: wrap;
      border-bottom: 2px solid black;
      padding-bottom: 12px;
      margin-bottom: 20px;
    }
    .kopf h1 {
      font-size: 1.8rem;
      font-weight: bold;
      letter-spacing: 1px;
    }
    .nr-datum {
      display: flex;
      gap: 30px;
    }
    .nr-datum div {
      display: flex;
      align-items: baseline;
      gap: 8px;
    }
    .nr-datum input {
      border: none;
      border-bottom: 1px solid black;
      width: 140px;
      font-family: inherit;
      font-size: 1rem;
      padding: 4px;
    }
    /* Feld Kassenbestand */
    .bestand-schluss {
      margin: 20px 0;
      display: flex;
      align-items: baseline;
      gap: 15px;
      flex-wrap: wrap;
    }
    .bestand-schluss label {
      font-weight: bold;
      font-size: 1.1rem;
    }
    .bestand-schluss input {
      border: none;
      border-bottom: 1px solid black;
      width: 150px;
      font-family: inherit;
      font-size: 1.1rem;
      padding: 5px;
    }
    /* Tabelle (genau wie Foto) */
    .ausgaben-table {
      width: 100%;
      border-collapse: collapse;
      margin: 20px 0;
    }
    .ausgaben-table th, .ausgaben-table td {
      border: 1px solid black;
      padding: 8px 6px;
      vertical-align: top;
    }
    .ausgaben-table th {
      background: #f9f9f9;
      font-weight: bold;
      text-align: left;
    }
    .ausgaben-table input {
      width: 100%;
      border: none;
      background: transparent;
      font-family: inherit;
      font-size: 0.95rem;
      padding: 4px;
    }
    .ausgaben-table input:focus {
      outline: none;
      background: #fffde7;
    }
    /* Leere Zeile (wie im Foto) */
    .leerzeile td {
      padding: 8px;
    }
    /* Untere Bereiche */
    .vorsteuer-netto {
      margin: 15px 0;
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      flex-wrap: wrap;
      gap: 20px;
      border-top: 1px dashed #aaa;
      padding-top: 15px;
    }
    .vorsteuer-netto div {
      display: flex;
      align-items: baseline;
      gap: 10px;
    }
    .zeile {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      flex-wrap: wrap;
      margin: 12px 0;
      gap: 15px;
    }
    .zeile label {
      font-weight: bold;
      min-width: 220px;
    }
    .zeile input {
      border: none;
      border-bottom: 1px solid black;
      width: 180px;
      font-family: inherit;
      font-size: 1rem;
      padding: 5px;
    }
    .kasseneingang {
      background: #f0f7f0;
      padding: 12px;
      margin: 20px 0;
      font-size: 1.2rem;
      font-weight: bold;
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      flex-wrap: wrap;
    }
    .steuer-prozente {
      display: flex;
      gap: 30px;
      margin-top: 15px;
    }
    .btn-group {
      margin-top: 30px;
      display: flex;
      gap: 15px;
      justify-content: center;
    }
    button {
      background: #1e4a76;
      color: white;
      border: none;
      padding: 8px 20px;
      font-family: inherit;
      font-size: 0.9rem;
      cursor: pointer;
      border-radius: 30px;
    }
    button:hover {
      background: #0f3a5a;
    }
    @media print {
      body { background: white; padding: 0; margin: 0; }
      .bericht { box-shadow: none; padding: 0; }
      .btn-group { display: none; }
      input { border-bottom: 1px solid black !important; }
    }
  </style>
</head>
<body>
<div class="bericht">
  <!-- Kopf -->
  <div class="kopf">
    <h1>Kassenbericht Nr.</h1>
    <div class="nr-datum">
      <div><span style="font-weight:bold;">Nr.</span> <input type="text" id="nr" placeholder="_____"></div>
      <div><span style="font-weight:bold;">Datum</span> <input type="date" id="datum" value="2026-05-01"></div>
    </div>
  </div>

  <!-- Kassenbestand bei Geschäftsschluß -->
  <div class="bestand-schluss">
    <label>Kassenbestand bei Geschäftsschluß</label>
    <input type="number" id="bestandSchluss" step="0.01" placeholder="0,00 €" value="0">
  </div>

  <!-- Buchungsvermerke / Tabelle -->
  <h3 style="margin: 10px 0 5px 0;">Buchungsvermerke</h3>
  <table class="ausgaben-table" id="ausgabenTabelle">
    <thead>
      <tr>
        <th>Ausgaben im Laufe des Tages</th>
        <th>Vorsteuer</th>
        <th>Netto-/Brutto-Betrag</th>
      </tr>
    </thead>
    <tbody>
      <tr><td><input type="text" id="ausgabe1" value="Wareneinkäufe und Warennebenkosten"></td><td><input type="number" id="vor1" step="0.01" value="0"></td><td><input type="number" id="betrag1" step="0.01" value="0"></td></tr>
      <tr><td><input type="text" id="ausgabe2" value="Geschäftsausgaben"></td><td><input type="number" id="vor2" step="0.01" value="0"></td><td><input type="number" id="betrag2" step="0.01" value="0"></td></tr>
      <tr><td><input type="text" id="ausgabe3" value="Privatentnahmen"></td><td><input type="number" id="vor3" step="0.01" value="0"></td><td><input type="number" id="betrag3" step="0.01" value="0"></td></tr>
      <tr><td><input type="text" id="ausgabe4" value="Sonstige Ausgaben"></td><td><input type="number" id="vor4" step="0.01" value="0"></td><td><input type="number" id="betrag4" step="0.01" value="0"></td></tr>
      <tr class="leerzeile"><td><input type="text" id="ausgabe5" placeholder="_________________"></td><td><input type="number" id="vor5" step="0.01" value="0"></td><td><input type="number" id="betrag5" step="0.01" value="0"></td></tr>
    </tbody>
  </table>

  <!-- Vorsteuer bei Nettobetrag (Zeile) -->
  <div class="vorsteuer-netto">
    <div><strong>Vorsteuer bei Nettobetrag</strong> <input type="text" id="vorsteuerGesamt" readonly style="background:#f1f1f1; width:120px;"></div>
    <div><strong>Summe abzüglich Kassenbestand des Vortages</strong> <input type="text" id="summeAbzgl" readonly style="background:#f1f1f1; width:140px;"></div>
  </div>

  <!-- Abzüglich sonstige Einnahmen -->
  <div class="zeile">
    <label>Abzüglich sonstige Einnahmen</label>
    <input type="number" id="sonstigeEinnahmen" step="0.01" value="0">
  </div>

  <!-- Kasseneingang (Ergebnis) -->
  <div class="kasseneingang">
    <span>Kasseneingang</span>
    <span id="kasseneingang">0,00 €</span>
  </div>

  <!-- 19% / 7% (Umsatzsteueranteile) -->
  <div class="steuer-prozente">
    <div><label>19%</label> <input type="number" id="steuer19" step="0.01" value="0" style="width:100px;"></div>
    <div><label>7%</label> <input type="number" id="steuer7" step="0.01" value="0" style="width:100px;"></div>
  </div>

  <div class="btn-group">
    <button onclick="berechnen()">Aktualisieren</button>
    <button onclick="window.print()">🖨️ Drucken</button>
    <button onclick="alleFelderLeeren()">🗑️ Alle Felder löschen</button>
  </div>
</div>

<script>
  // Hilfsfunktion: Euro-Format
  function euro(n) {
    return (Number(n) || 0).toFixed(2).replace('.', ',') + ' €';
  }

  function berechnen() {
    // 1. Summe der Ausgaben (Brutto) aus den Beträgen 1-5
    let betrag1 = parseFloat(document.getElementById('betrag1').value) || 0;
    let betrag2 = parseFloat(document.getElementById('betrag2').value) || 0;
    let betrag3 = parseFloat(document.getElementById('betrag3').value) || 0;
    let betrag4 = parseFloat(document.getElementById('betrag4').value) || 0;
    let betrag5 = parseFloat(document.getElementById('betrag5').value) || 0;
    let summeAusgabenBrutto = betrag1 + betrag2 + betrag3 + betrag4 + betrag5;

    // 2. Summe Vorsteuer
    let vor1 = parseFloat(document.getElementById('vor1').value) || 0;
    let vor2 = parseFloat(document.getElementById('vor2').value) || 0;
    let vor3 = parseFloat(document.getElementById('vor3').value) || 0;
    let vor4 = parseFloat(document.getElementById('vor4').value) || 0;
    let vor5 = parseFloat(document.getElementById('vor5').value) || 0;
    let vorsteuerSumme = vor1 + vor2 + vor3 + vor4 + vor5;
    document.getElementById('vorsteuerGesamt').value = euro(vorsteuerSumme);

    // 3. Kassenbestand Schluss
    let bestandSchluss = parseFloat(document.getElementById('bestandSchluss').value) || 0;

    // 4. Kassenbestand Vortag (muss der Benutzer manuell eintragen – wie im Foto)
    // Laut Foto: "Summe abzüglich Kassenbestand des Vortages" = (Bestand Schluss + Ausgaben) - Vortag
    // Also brauchen wir einen Eingabefeld für den Vortag. Im Original ist das eine Zeile zum Eintragen.
    // Ich füge ein verstecktes / sichtbares Feld hinzu, da es auf dem Foto vorhanden ist.
    // VORSICHT: Im Screenshot gibt es ein Feld "Summe abzüglich Kassenbestand des Vortages" – das ist bereits ein Ergebnis.
    // Aber der "Kassenbestand des Vortages" muss eingegeben werden. Ich lege ein separates Feld an.
    let vortag = parseFloat(document.getElementById('vortagFeld')?.value) || 0;
    
    // Falls das Feld nicht existiert, lege ich es dynamisch an?
    // Besser: Ein neues input Feld für "Kassenbestand des Vortages" einfügen, wie in der echten Vorlage.
    // Aber der Benutzer möchte exakt das Foto. Im Foto gibt es eine Zeile "Summe abzüglich Kassenbestand des Vortages" (Ergebnis)
    // und davor muss der Vortag eingetragen werden. Ich werde daher ein zusätzliches Feld "Kassenbestand des Vortages" oberhalb einfügen.
    // Da der Benutzer nichts Neues möchte, muss ich es genau wie im Foto platzieren.
    // Ich füge es oberhalb der "Summe abzüglich..." ein.
  }

  // Um das Layout exakt zu halten, füge ich nun die fehlende Eingabezeile "Kassenbestand des Vortages" hinzu.
  // Das ist im Foto vorhanden (siehe "Summe abzüglich Kassenbestand des Vortages" – das setzt einen eingegebenen Wert voraus).
  // Ich ergänze die Zeile direkt nach der Tabelle.
</script>

<!-- Erweiterung: Eingabefeld für Vortag und automatische Berechnung aller Werte -->
<script>
  // Funktion zum Einfügen des fehlenden Feldes "Kassenbestand des Vortages" (exakt wie im Formular)
  function fuegeVortagFeldEin() {
    const container = document.querySelector('.vorsteuer-netto');
    if (!container) return;
    const neueZeile = document.createElement('div');
    neueZeile.style.display = 'flex';
    neueZeile.style.justifyContent = 'space-between';
    neueZeile.style.alignItems = 'baseline';
    neueZeile.style.margin = '10px 0';
    neueZeile.style.flexWrap = 'wrap';
    neueZeile.innerHTML = `
      <div><strong>Kassenbestand des Vortages</strong> <input type="number" id="vortag" step="0.01" value="0" style="width:140px; border:none; border-bottom:1px solid black;"></div>
      <div style="visibility:hidden;"> </div>
    `;
    container.insertBefore(neueZeile, container.firstChild);
  }

  // Vollständige Berechnung (nachdem alle Felder da sind)
  function vollBerechnen() {
    let betrag1 = parseFloat(document.getElementById('betrag1').value) || 0;
    let betrag2 = parseFloat(document.getElementById('betrag2').value) || 0;
    let betrag3 = parseFloat(document.getElementById('betrag3').value) || 0;
    let betrag4 = parseFloat(document.getElementById('betrag4').value) || 0;
    let betrag5 = parseFloat(document.getElementById('betrag5').value) || 0;
    let summeAusgaben = betrag1 + betrag2 + betrag3 + betrag4 + betrag5;

    let vor1 = parseFloat(document.getElementById('vor1').value) || 0;
    let vor2 = parseFloat(document.getElementById('vor2').value) || 0;
    let vor3 = parseFloat(document.getElementById('vor3').value) || 0;
    let vor4 = parseFloat(document.getElementById('vor4').value) || 0;
    let vor5 = parseFloat(document.getElementById('vor5').value) || 0;
    let vorsteuer = vor1+vor2+vor3+vor4+vor5;
    document.getElementById('vorsteuerGesamt').value = euro(vorsteuer);

    let bestandSchluss = parseFloat(document.getElementById('bestandSchluss').value) || 0;
    let vortag = parseFloat(document.getElementById('vortag').value) || 0;
    let sonstige = parseFloat(document.getElementById('sonstigeEinnahmen').value) || 0;

    let zwischen = bestandSchluss + summeAusgaben;
    let abzug = zwischen - vortag;
    let kasseneingang = abzug - sonstige;

    document.getElementById('summeAbzgl').value = euro(abzug);
    document.getElementById('kasseneingang').innerHTML = euro(kasseneingang);

    // Optional: Steuer 19/7 bleiben zur manuellen Eingabe
  }

  function alleFelderLeeren() {
    // Leeren aller Eingabefelder
    const inputs = document.querySelectorAll('input');
    inputs.forEach(inp => {
      if (inp.type === 'number' || inp.type === 'text') {
        if (inp.id !== 'datum' && inp.id !== 'nr' && !inp.readOnly) {
          inp.value = (inp.id.includes('ausgabe') && inp.type === 'text') ? '' : '0';
        }
      }
    });
    // Standardtexte wiederherstellen
    if(document.getElementById('ausgabe1')) document.getElementById('ausgabe1').value = 'Wareneinkäufe und Warennebenkosten';
    if(document.getElementById('ausgabe2')) document.getElementById('ausgabe2').value = 'Geschäftsausgaben';
    if(document.getElementById('ausgabe3')) document.getElementById('ausgabe3').value = 'Privatentnahmen';
    if(document.getElementById('ausgabe4')) document.getElementById('ausgabe4').value = 'Sonstige Ausgaben';
    if(document.getElementById('ausgabe5')) document.getElementById('ausgabe5').value = '';
    document.getElementById('bestandSchluss').value = '0';
    document.getElementById('vortag').value = '0';
    document.getElementById('sonstigeEinnahmen').value = '0';
    document.getElementById('steuer19').value = '0';
    document.getElementById('steuer7').value = '0';
    for(let i=1;i<=5;i++) {
      document.getElementById(`vor${i}`).value = '0';
      document.getElementById(`betrag${i}`).value = '0';
    }
    vollBerechnen();
  }

  // Event-Listener für alle relevanten Felder
  function bindEvents() {
    const ids = ['bestandSchluss', 'vortag', 'sonstigeEinnahmen', 'betrag1','betrag2','betrag3','betrag4','betrag5'];
    ids.forEach(id => {
      const el = document.getElementById(id);
      if(el) el.addEventListener('input', vollBerechnen);
    });
    for(let i=1;i<=5;i++) {
      const vor = document.getElementById(`vor${i}`);
      if(vor) vor.addEventListener('input', vollBerechnen);
    }
  }

  // Initialisierung: Feld für Vortag einfügen, dann berechnen
  window.onload = () => {
    fuegeVortagFeldEin();
    bindEvents();
    vollBerechnen();
    // Button "Aktualisieren" ruft ebenfalls vollBerechnen auf
    const btn = document.querySelector('button[onclick="berechnen()"]');
    if(btn) btn.onclick = (e) => { e.preventDefault(); vollBerechnen(); };
  };
</script>
</body>
</html>
